version: "3.8"
services:
  db:
    image: mysql:8.0
    container_name: sejong-life-db
    ports:
      - "3308:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "12345678"
      MYSQL_DATABASE: "sejong_life_db"
      TZ: "Asia/Seoul"
    volumes:
      - db-data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: sejong-life-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped

volumes:
  db-data:
